name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "赛博木鱼 ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            main.py
            metadata.yaml
            _conf_schema.json
            README.md
            LICENSE
